<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>GJB Hospital Login</title>
  <link rel="stylesheet" href="login.css">
</head>

<body>

  <div id="particles-js"></div>

  <div class="login-card">
    <!-- Left Column: Medical Illustration -->
    <div class="illustration-panel">
      <div class="circle-bg"></div>
      <img src="doctors_illustration.png" alt="Medical Team">
    </div>

    <!-- Right Column: Login Form -->
    <div class="form-panel">
      <div class="login-box">
        <div class="logo-container">
          <!-- Modern Teal Loop SVG Logo -->
          <svg width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 15C55 35 75 45 85 50C75 55 55 65 50 85C45 65 25 55 15 50C25 45 45 35 50 15Z" fill="#0ea5e9"
              stroke="#0284c7" stroke-width="6" stroke-linejoin="round" />
            <circle cx="50" cy="50" r="12" fill="#fff" />
          </svg>
          <span class="logo-text">Lifeline</span>
        </div>

        <!-- login page change area -->
        <h2>Welcome Back</h2>
        <p class="subtitle">Please enter your credentials to continue</p>
        <p class="subtitle">Staff:1001:staff123 | Admin:9999:admin123</p>

        <select id="role">
          <option value="">Select Role</option>
          <option value="staff">Staff</option>
          <option value="admin">Admin</option>
        </select>

        <input type="number" id="uid" placeholder="ID Number">

        <div class="password-box">
          <input type="password" id="pwd" placeholder="Password">
          <span onclick="togglePassword()">👁️</span>
        </div>

        <label class="remember">
          <input type="checkbox" id="remember"> Remember me
        </label>

        <button onclick="login()">LOGIN</button>

        <p id="msg"></p>
      </div>
    </div>
  </div>

  <script src="login.js"></script>
</body>

</html>
