<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>GJB Hospital Login</title>
  <link rel="stylesheet" href="login.css">
</head>

<body>

  <div class="login-card">
    <!-- Left Column: Medical Illustration -->
    <div class="illustration-panel">
      <div class="circle-bg"></div>
      <img src="doctors_illustration.png" alt="Medical Team">
    </div>

    <!-- Right Column: Login Form -->
    <div class="form-panel">
      <div class="login-box">
        <div class="logo-container">
          <img src="gjb_hospital_logo.png" alt="GJB Hospital Logo" class="logo-img">
        </div>

        <h2>Welcome Back</h2>
        <p class="subtitle">Please enter your credentials to continue</p>
        <p class="subtitle">Staff : 1001 : staff123/ Admin: 9999 : admin123</p>


        <select id="role">
          <option value="">Select Role</option>
          <option value="staff">Staff</option>
          <option value="admin">Admin</option>
        </select>

        <input type="number" id="uid" placeholder="ID Number">

        <div class="password-box">
          <input type="password" id="pwd" placeholder="Password">
          <span onclick="togglePassword()">👁️</span>
        </div>

        <label class="remember">
          <input type="checkbox" id="remember"> Remember me
        </label>

        <button onclick="login()">LOGIN</button>

        <p id="msg"></p>
      </div>
    </div>
  </div>

  <script src="login.js"></script>
</body>

</html>
